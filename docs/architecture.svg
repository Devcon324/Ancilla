<svg xmlns="http://www.w3.org/2000/svg" width="960" height="740" viewBox="0 0 960 740" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e11d48"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="740" fill="#f8fafc"/>
  <text x="30" y="36" font-size="22" font-weight="700" fill="#0f172a">Jetson Voice Assistant - pipeline</text>
  <text x="30" y="58" font-size="13" fill="#64748b">mic -&gt; wake word -&gt; VAD capture -&gt; whisper.cpp -&gt; hybrid router -&gt; Piper TTS</text>

  <!-- ===== Capture / pipeline spine (left) ===== -->
  <rect x="70" y="82" width="240" height="48" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="111" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Microphone</text>

  <rect x="70" y="154" width="240" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="178" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Wake word</text>
  <text x="190" y="197" text-anchor="middle" font-size="12" fill="#6d28d9">openWakeWord - "hey jarvis"</text>

  <rect x="70" y="236" width="240" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="260" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Utterance capture</text>
  <text x="190" y="279" text-anchor="middle" font-size="12" fill="#6d28d9">Silero VAD - one mic stream</text>

  <rect x="70" y="318" width="240" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="342" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Speech-to-text</text>
  <text x="190" y="361" text-anchor="middle" font-size="12" fill="#6d28d9">whisper.cpp - base.en - :8080</text>

  <rect x="70" y="400" width="240" height="64" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="190" y="426" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">Intent router</text>
  <text x="190" y="446" text-anchor="middle" font-size="12" fill="#b45309">keyword fast paths + LLM tools</text>

  <rect x="70" y="540" width="240" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="564" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Text-to-speech</text>
  <text x="190" y="583" text-anchor="middle" font-size="12" fill="#6d28d9">Piper in-process - streamed</text>

  <rect x="70" y="622" width="240" height="48" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="651" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Speaker</text>

  <!-- ===== Tools panel (right) ===== -->
  <rect x="420" y="82" width="510" height="620" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="445" y="112" font-size="14" font-weight="700" fill="#334155">Router dispatches to...</text>

  <!-- Instant (green) -->
  <rect x="445" y="128" width="460" height="52" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="465" y="151" font-size="14" font-weight="600" fill="#065f46">Clock - local time</text>
  <text x="465" y="169" font-size="11.5" fill="#047857">"what time is it" - no LLM</text>

  <rect x="445" y="190" width="460" height="52" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="465" y="213" font-size="14" font-weight="600" fill="#065f46">Volume - PipeWire wpctl</text>
  <text x="465" y="231" font-size="11.5" fill="#047857">up / down / set / query - no LLM</text>

  <rect x="445" y="252" width="460" height="52" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="465" y="275" font-size="14" font-weight="600" fill="#065f46">Music - mpv</text>
  <text x="465" y="293" font-size="11.5" fill="#047857">radio / YouTube yt-dlp / optional Navidrome</text>

  <rect x="445" y="314" width="460" height="52" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="465" y="337" font-size="14" font-weight="600" fill="#065f46">Store hours - OpenStreetMap</text>
  <text x="465" y="355" font-size="11.5" fill="#047857">"is Walmart open" - Overpass</text>

  <!-- Tool + LLM phrase (teal) -->
  <rect x="445" y="376" width="460" height="52" rx="9" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="465" y="399" font-size="14" font-weight="600" fill="#115e59">Weather - Open-Meteo</text>
  <text x="465" y="417" font-size="11.5" fill="#0f766e">real forecast - LLM only phrases it</text>

  <rect x="445" y="438" width="460" height="52" rx="9" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="465" y="461" font-size="14" font-weight="600" fill="#115e59">Web search - DuckDuckGo</text>
  <text x="465" y="479" font-size="11.5" fill="#0f766e">live results - LLM phrases them</text>

  <!-- LLM (magenta) -->
  <rect x="445" y="500" width="460" height="58" rx="9" fill="#fae8ff" stroke="#c026d3" stroke-width="1.5"/>
  <text x="465" y="525" font-size="14" font-weight="700" fill="#86198f">LLM - llama.cpp / Qwen2.5-3B Q4</text>
  <text x="465" y="544" font-size="11.5" fill="#a21caf">chat + tool select - streaming - :8081</text>

  <!-- Legend -->
  <rect x="445" y="580" width="14" height="14" rx="3" fill="#d1fae5" stroke="#10b981"/>
  <text x="466" y="592" font-size="12" fill="#334155">instant / no LLM</text>
  <rect x="590" y="580" width="14" height="14" rx="3" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="611" y="592" font-size="12" fill="#334155">API + LLM phrase</text>
  <rect x="745" y="580" width="14" height="14" rx="3" fill="#fae8ff" stroke="#c026d3"/>
  <text x="766" y="592" font-size="12" fill="#334155">LLM</text>

  <text x="445" y="630" font-size="12" fill="#64748b">Barge-in: wake hit pauses TTS, STT must confirm "jarvis"</text>
  <text x="445" y="652" font-size="12" fill="#64748b">Dismiss: "nevermind" returns to wake wait (silent)</text>
  <text x="445" y="674" font-size="12" fill="#64748b">Audio I/O: PipeWire - Jetson Orin Nano / Linux / Pi</text>

  <!-- ===== Arrows: spine ===== -->
  <line x1="190" y1="130" x2="190" y2="152" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="212" x2="190" y2="234" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="294" x2="190" y2="316" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="376" x2="190" y2="398" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="598" x2="190" y2="620" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router -> tools -->
  <path d="M310 432 C 360 432, 380 360, 420 360" fill="none" stroke="#f59e0b" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="318" y="400" font-size="11.5" fill="#b45309" font-weight="600">dispatch</text>

  <!-- Tools -> TTS (reply) -->
  <path d="M420 560 C 380 560, 360 560, 310 560" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="322" y="552" font-size="11.5" fill="#334155" font-weight="600">reply</text>

  <!-- Barge-in loop: Speaker/TTS -> Wake -->
  <path d="M70 560 C 22 560, 22 183, 68 183" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowDashed)"/>
  <text x="16" y="380" font-size="11.5" fill="#e11d48" font-weight="600" transform="rotate(-90 16 380)">barge-in (STT confirm)</text>

  <!-- Foot note -->
  <text x="30" y="700" font-size="12" fill="#64748b">Facts never invented by the model: tools fetch real data; the LLM phrases or chats.</text>
  <text x="30" y="720" font-size="12" fill="#64748b">Servers: whisper-server :8080  |  llama-server :8081  |  assistant process (wake + VAD + Piper)</text>
</svg>
