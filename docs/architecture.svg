<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e11d48"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="720" fill="#f8fafc"/>
  <text x="30" y="42" font-size="24" font-weight="700" fill="#0f172a">Jetson Voice Assistant &#8212; pipeline</text>
  <text x="30" y="66" font-size="13" fill="#64748b">local-first: audio in &#8594; wake word &#8594; STT &#8594; hybrid routing &#8594; streaming TTS out</text>

  <!-- ===== Capture / pipeline spine (left) ===== -->
  <rect x="70" y="92" width="240" height="52" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Microphone</text>

  <rect x="70" y="172" width="240" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="198" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Wake word</text>
  <text x="190" y="217" text-anchor="middle" font-size="12" fill="#6d28d9">openWakeWord &#183; &#8220;hey jarvis&#8221;</text>

  <rect x="70" y="260" width="240" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="286" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Utterance capture</text>
  <text x="190" y="305" text-anchor="middle" font-size="12" fill="#6d28d9">Silero VAD endpointing</text>

  <rect x="70" y="348" width="240" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="374" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Speech-to-text</text>
  <text x="190" y="393" text-anchor="middle" font-size="12" fill="#6d28d9">whisper.cpp server &#183; :8080</text>

  <rect x="70" y="436" width="240" height="66" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="190" y="464" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">Intent router</text>
  <text x="190" y="484" text-anchor="middle" font-size="12" fill="#b45309">hybrid keyword + LLM dispatch</text>

  <rect x="70" y="560" width="240" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="190" y="586" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">Text-to-speech</text>
  <text x="190" y="605" text-anchor="middle" font-size="12" fill="#6d28d9">Piper &#183; sentence-chunked</text>

  <rect x="70" y="648" width="240" height="52" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="680" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Speaker</text>

  <!-- ===== Tools panel (right) ===== -->
  <rect x="430" y="150" width="490" height="500" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="455" y="180" font-size="14" font-weight="700" fill="#334155">Router dispatches to&#8230;</text>

  <rect x="455" y="196" width="440" height="56" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="222" font-size="14" font-weight="600" fill="#065f46">Clock &#8212; instant local time</text>
  <text x="475" y="240" font-size="11.5" fill="#047857">&#8220;what time is it&#8221; &#183; no server, no LLM</text>

  <rect x="455" y="262" width="440" height="56" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="288" font-size="14" font-weight="600" fill="#065f46">Music &#8212; Navidrome + mpv</text>
  <text x="475" y="306" font-size="11.5" fill="#047857">&#8220;play &#8230;&#8221; / &#8220;stop&#8221; &#183; self-hosted library</text>

  <rect x="455" y="328" width="440" height="56" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="354" font-size="14" font-weight="600" fill="#065f46">Store hours &#8212; OpenStreetMap / Overpass</text>
  <text x="475" y="372" font-size="11.5" fill="#047857">&#8220;is Walmart open&#8221; &#183; optional Google Places</text>

  <rect x="455" y="394" width="440" height="56" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="420" font-size="14" font-weight="600" fill="#065f46">Weather &#8212; Open-Meteo</text>
  <text x="475" y="438" font-size="11.5" fill="#047857">geocode + forecast &#183; phrased by LLM</text>

  <rect x="455" y="460" width="440" height="56" rx="9" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="486" font-size="14" font-weight="600" fill="#065f46">Web search &#8212; DuckDuckGo (ddgs)</text>
  <text x="475" y="504" font-size="11.5" fill="#047857">live lookups &#183; results phrased by LLM</text>

  <rect x="455" y="526" width="440" height="60" rx="9" fill="#fae8ff" stroke="#c026d3" stroke-width="1.5"/>
  <text x="475" y="552" font-size="14" font-weight="700" fill="#86198f">LLM &#8212; llama.cpp &#183; Qwen2.5-3B &#183; :8081</text>
  <text x="475" y="571" font-size="11.5" fill="#a21caf">general chat + phrases verified tool data (streaming)</text>

  <!-- ===== Arrows: spine ===== -->
  <line x1="190" y1="144" x2="190" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="232" x2="190" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="320" x2="190" y2="346" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="408" x2="190" y2="434" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="620" x2="190" y2="646" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router -> tools panel (dispatch) -->
  <path d="M310 465 C 370 465, 380 400, 430 400" fill="none" stroke="#f59e0b" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="330" y="430" font-size="11.5" fill="#b45309" font-weight="600">dispatch</text>

  <!-- Tools panel -> TTS (spoken reply) -->
  <path d="M430 590 C 380 590, 360 590, 310 590" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="330" y="583" font-size="11.5" fill="#334155" font-weight="600">reply text</text>

  <!-- Barge-in loop: TTS -> Wake word -->
  <path d="M70 588 C 24 588, 24 202, 68 202" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowDashed)"/>
  <text x="18" y="400" font-size="11.5" fill="#e11d48" font-weight="600" transform="rotate(-90 18 400)">barge-in: say &#8220;hey jarvis&#8221; to interrupt</text>
</svg>
